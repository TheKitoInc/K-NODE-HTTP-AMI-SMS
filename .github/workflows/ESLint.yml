name: ESLint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ESLint:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💾 Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: ✨ Initialize package.json if not exists
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: 📦 Install ESLint
        run: npm install --save-dev eslint

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: 📝 Create configuration
        run: |
          if [ ! -f eslint.config.js ]; then
            echo 'module.exports = [{rules: {semi: "error", "prefer-const": "error"}}];' > eslint.config.js
          fi

      - name: ✍️ Run ESLint fix
        run: npx eslint --fix .

      - name: 🛠️ Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: ⬇️ Pull latest changes to avoid conflicts
        run: |
          git fetch
          git pull

      - name: 📤 Commit changes if needed
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Apply formatting ESLint"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
